<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретный Альбом</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #bb86fc;
            --error-color: #cf6679;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Экран входа */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
        }

        #login-screen.hidden { display: none; }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        input[type="password"], button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="password"] {
            background: #2c2c2c;
            color: white;
            outline: none;
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #a06cd5; }
        button:disabled { background-color: #555; cursor: not-allowed; }

        #login-error {
            color: var(--error-color);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* Экран альбома */
        #album-screen { display: none; width: 100%; max-width: 1200px; }
        #album-screen.active { display: block; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .upload-area {
            border: 2px dashed #444;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 30px;
            position: relative;
        }

        .upload-area:hover { border-color: var(--accent-color); background: rgba(187, 134, 252, 0.05); }
        .upload-area input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            position: relative;
        }

        .gallery-item:hover { transform: translateY(-5px); }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--error-color);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            width: auto;
            padding: 5px 10px;
            border-radius: 15px;
        }

        .gallery-item:hover .delete-btn { opacity: 1; }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Вход в альбом</h2>
            <input type="password" id="password-input" placeholder="Введите пароль">
            <button onclick="checkPassword()">Войти</button>
            <div id="login-error">Неверный пароль</div>
        </div>
    </div>

    <!-- Экран альбома -->
    <div id="album-screen">
        <div class="header">
            <h1>Мой фотоальбом 📸</h1>
            <button onclick="logout()" style="width: auto; background: #333; color: white;">Выйти</button>
        </div>

        <div class="upload-area" id="upload-area">
            <h3>Нажмите или перетащите фотографии сюда</h3>
            <p>Фотографии загрузятся в облако</p>
            <input type="file" id="file-input" multiple accept="image/*" onchange="handleFiles(this.files)">
            <div class="loader" id="upload-loader"></div>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        // === НАСТРОЙКИ ===
        const CORRECT_PASSWORD = '1234'; // ЗАМЕНИТЕ НА СВОЙ ПАРОЛЬ
        const API_KEY = 'ВАШ_API_KEY_Сюда'; // ВСТАВЬТЕ СЮДА КЛЮЧ С imgbb.com
        // =================

        // Проверка пароля (хранится только в браузере!)
        function checkPassword() {
            const pass = document.getElementById('password-input').value;
            if (pass === CORRECT_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('album-screen').classList.add('active');
                loadGallery();
            } else {
                const err = document.getElementById('login-error');
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        }

        // Выход
        function logout() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('album-screen').classList.remove('active');
            document.getElementById('password-input').value = '';
        }

        // Загрузка в ImgBB
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Ошибка загрузки');
            const data = await response.json();
            return data.data.display_url; // Возвращаем прямую ссылку на картинку
        }

        // Обработка выбранных файлов
        async function handleFiles(files) {
            const loader = document.getElementById('upload-loader');
            const uploadArea = document.getElementById('upload-area');
            loader.style.display = 'block';
            uploadArea.style.pointerEvents = 'none';

            let photos = JSON.parse(localStorage.getItem('myAlbumPhotos') || '[]');

            for (let i = 0; i < files.length; i++) {
                try {
                    const url = await uploadToImgBB(files[i]);
                    photos.push(url);
                } catch (e) {
                    alert(`Не удалось загрузить файл: ${files[i].name}`);
                }
            }

            localStorage.setItem('myAlbumPhotos', JSON.stringify(photos));
            
            loader.style.display = 'none';
            uploadArea.style.pointerEvents = 'auto';
            document.getElementById('file-input').value = ''; // сброс инпута
            
            loadGallery();
        }

        // Отрисовка галереи
        function loadGallery() {
            const gallery = document.getElementById('gallery');
            const photos = JSON.parse(localStorage.getItem('myAlbumPhotos') || '[]');
            
            gallery.innerHTML = '';
            
            photos.forEach((url, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${url}" alt="Фото ${index + 1}" loading="lazy">
                    <button class="delete-btn" onclick="deletePhoto(${index})">✕ Удалить</button>
                `;
                gallery.appendChild(item);
            });
        }

        // Удаление фото (удаляет только ссылку из локального хранилища)
        function deletePhoto(index) {
            if(confirm('Удалить это фото из альбома?')) {
                let photos = JSON.parse(localStorage.getItem('myAlbumPhotos') || '[]');
                photos.splice(index, 1);
                localStorage.setItem('myAlbumPhotos', JSON.stringify(photos));
                loadGallery();
            }
        }

        // Обработка нажатия Enter на поле пароля
        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
